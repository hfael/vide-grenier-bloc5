services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vide-grenier-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: videgrenierenligne
      DB_USER: videgrenier
      DB_PASSWORD: videgrenier
      APP_SHOW_ERRORS: "1"
      COMPOSER_ALLOW_SUPERUSER: "1"
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor

  db:
    image: mysql:8.0
    container_name: vide-grenier-db
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8 --collation-server=utf8_general_ci
    environment:
      MYSQL_DATABASE: videgrenierenligne
      MYSQL_USER: videgrenier
      MYSQL_PASSWORD: videgrenier
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/import.sql:/docker-entrypoint-initdb.d/01-import.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: vide-grenier-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: videgrenier
      PMA_PASSWORD: videgrenier
      PMA_ROOT_PASSWORD: root
    ports:
      - "8090:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  vendor_data:
