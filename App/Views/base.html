<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="icon" href="/favicon.png">

    <title>Vide Grenier En Ligne | {% block title %}{% endblock %}</title>

    <!-- Tailwind CSS -->
    <link href="/style/main.css" rel="stylesheet">
    <link href="/css/font-awesome.min.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Hind:400,300,500,600,700|Hind+Guntur:300,400,500,700' rel='stylesheet' type='text/css'>

</head>
<body class="bg-white text-gray-900">

<!-- Navbar -->
<nav class="border-b border-gray-200 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center">
                <a href="/" class="flex items-center">
                    <img src="/images/logo.png" alt="Logo" class="h-10 w-10">
                    <span class="ml-2 text-lg font-semibold hidden sm:inline">Vide Grenier en ligne</span>
                </a>
            </div>

            <!-- Menu Desktop -->
            <div class="hidden sm:flex items-center space-x-8">
                <a href="/product" class="text-red-500 hover:text-red-600 font-medium">Déposer une annonce</a>
            </div>

            <!-- User Menu -->
            <div class="flex items-center space-x-4">
                {% if user is not null %}
                    <div class="relative group">
                        <button class="flex items-center space-x-1 px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-gray-900">
                            {{ user.username }}
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                            </svg>
                        </button>
                        <div class="hidden group-hover:block absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg z-50">
                            <a href="/account" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Mon compte</a>
                            <a href="/logout" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 border-t">Déconnexion</a>
                        </div>
                    </div>
                {% else %}
                    <a href="/login" class="text-gray-700 hover:text-gray-900">Connexion</a>
                    <span class="text-gray-400">.</span>
                    <a href="/register" class="text-gray-700 hover:text-gray-900">Inscription</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<!-- Main Content -->
{% block body %}
{% endblock %}

<!-- Footer -->
<footer class="bg-gray-50 border-t border-gray-200 mt-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Logo -->
            <div class="flex items-center">
                <img src="/images/logo.png" alt="Logo" class="h-10 w-10">
                <span class="ml-2 font-semibold">Vide Grenier en ligne</span>
            </div>

            <!-- Links -->
            <div class="flex justify-center space-x-6 text-sm text-gray-600">
                <a href="#" class="hover:text-gray-900">Politique cookies</a>
                <a href="#" class="hover:text-gray-900">Confidentialité</a>
                <span>© 2020 CESI</span>
            </div>

            <!-- Social -->
            <div class="flex justify-end space-x-6">
                <a href="#" class="text-gray-600 hover:text-gray-900"><i class="fab fa-facebook"></i></a>
                <a href="#" class="text-gray-600 hover:text-gray-900"><i class="fab fa-twitter"></i></a>
                <a href="#" class="text-gray-600 hover:text-gray-900"><i class="fab fa-google-plus"></i></a>
            </div>
        </div>
    </div>
</footer>

<!-- Scripts -->
<script src="/js/jquery.min.js"></script>
<script src="/bootstrap/js/bootstrap.min.js"></script>
<script src="/js/custom.js"></script>

{% block javascript %}
{% endblock %}

</body>
</html>
