{% extends "base.html" %}

{% block title %}Inscription{% endblock %}

{% block body %}
<main class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">

        <h1 class="text-3xl font-bold text-center mb-8 text-gray-900">Créer un compte</h1>

        {% if error is defined %}
            <div class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" action="" class="space-y-6">

            <!-- Username -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" placeholder="John Doe" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none">
            </div>

            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="email" name="email" placeholder="example@gmail.com" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none">
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none">
            </div>

            <!-- Confirm Password -->
            <div>
                <label for="password-check" class="block text-sm font-medium text-gray-700 mb-2">Confirmer le mot de passe</label>
                <input type="password" id="password-check" name="password-check" placeholder="••••••••" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none">
            </div>

            <!-- Submit Button -->
            <button type="submit" name="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg transition">
                Valider
            </button>

            <!-- Login Link -->
            <div class="text-center">
                <p class="text-gray-600">Déjà inscrit?
                    <a href="/login" class="text-red-500 hover:text-red-600 font-semibold">Se connecter</a>
                </p>
            </div>

        </form>

    </div>
</main>
{% endblock %}
