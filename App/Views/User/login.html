{% extends "base.html" %}

{% block title %}Connexion{% endblock %}

{% block body %}
<main class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">

        <h1 class="text-3xl font-bold text-center mb-8 text-gray-900">Connexion</h1>

        {% if error is defined %}
            <div class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" action="" class="space-y-6">

            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="email" name="email" placeholder="example@gmail.com" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none">
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none">
            </div>

            <!-- Remember Me -->
            <div class="flex items-center">
                <input type="checkbox" id="remember_me" name="remember_me" class="h-4 w-4 text-red-500 rounded border-gray-300">
                <label for="remember_me" class="ml-2 text-sm text-gray-700">Se souvenir de moi</label>
            </div>
            <p class="text-xs text-gray-500">(non recommandé si vous êtes sur un ordinateur partagé)</p>

            <!-- Submit Button -->
            <button type="submit" name="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg transition">
                Connexion
            </button>

            <!-- Signup Link -->
            <div class="text-center">
                <p class="text-gray-600">Pas encore de compte?
                    <a href="/register" class="text-red-500 hover:text-red-600 font-semibold">Créer un compte</a>
                </p>
            </div>

            <!-- Forgot Password -->
            <div class="text-center">
                <a href="#" class="text-gray-600 hover:text-gray-900 text-sm">Mot de passe oublié?</a>
            </div>

        </form>

    </div>
</main>
{% endblock %}
