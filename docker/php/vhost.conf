<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
        DirectoryIndex index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/vide-grenier-error.log
    CustomLog ${APACHE_LOG_DIR}/vide-grenier-access.log combined
</VirtualHost>
